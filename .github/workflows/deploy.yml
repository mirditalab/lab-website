name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules and molstar build
        id: cache-build
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            minimolstar/node_modules
            minimolstar/molstar.js
          key: build-${{ runner.os }}-${{ hashFiles('package-lock.json', 'minimolstar/package-lock.json') }}

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Install dependencies
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build mol*
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: npm run build:molstar

      - name: Build site
        run: node scripts/build-team.mjs

      - name: Render OG image
        run: node scripts/render-og.mjs

      - name: Assemble deployment directory
        run: |
          mkdir _site
          cp index.html index.en.html index.ko.html _site/
          cp -r static webfonts _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
